# PRISM Security Policy Configuration

# Packages that are explicitly blocked from use
blocked_packages:
  - openssl

# CVSS Severity Thresholds (CVSS v3.1 standard)
# You can customize these values per project requirements
severity_thresholds:
  critical: 9.0   # CVSS >= 9.0
  high: 7.0       # CVSS >= 7.0
  medium: 4.0     # CVSS >= 4.0
  low: 0.1        # CVSS >= 0.1

# Policy Gates - What severity levels trigger FAIL/WARN/PASS
policy_gates:
  # Fail the PR if these severity levels are found
  fail_on:
    - CRITICAL
    - HIGH

  # Warn but allow merge for these severity levels
  warn_on:
    - MEDIUM

  # Allow these severity levels
  allow:
    - LOW
    - UNKNOWN
  
  # NEW: Only fail on reachable vulnerabilities (ignore unreachable ones)
  fail_on_reachable_only: false

# Advanced Conditional Rules (evaluated first, in order)
# These rules support complex logic with reachability analysis
rules:
  # Rule 1: Block critical AND reachable vulnerabilities
  - type: deny
    when: severity == "CRITICAL" and reachable == true
    msg: "Critical & reachable → Block"

  # Rule 2: Allow high severity if not reachable
  - type: allow
    when: severity == "HIGH" and reachable == false
    msg: "High but not reachable → Allow with warning"

  # Rule 3: Warn on medium/low severity
  - type: warn
    when: severity in ["LOW", "MEDIUM"]
    msg: "Low/Medium → Allow with warning"
name: Generate SBOM on PR

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  security-scan:
    runs-on: ubuntu-latest
    name: SBOM Generation & Vulnerability Scan
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node (for npm projects; remove for other ecosystems)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies (npm ci)
        if: always()
        run: |
          # Only do this if your project has a lockfile and requires install:
          if [ -f package-lock.json ]; then npm ci; elif [ -f package.json ]; then npm install --no-audit --no-fund; fi

      - name: Generate SBOM and upload artifact (Anchore sbom-action)
        uses: anchore/sbom-action@v0
        with:
          # Choose format: spdx-json, cyclonedx-json, syft-json, etc.
          format: cyclonedx-json
          output-file: sbom.json
          # target defaults to workspace; you can set TARGET to a path or image
          # target: .

      - name: Set up Python for vulnerability scanning
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Vulnerability Scanner
        id: vuln-scan
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "🔍 Scanning SBOM for vulnerabilities..."
          python -m agent.main sbom.json --output vulnscan-output
          echo "scan_complete=true" >> $GITHUB_OUTPUT

      - name: Display Vulnerability Report
        if: always()
        run: |
          echo "========================================="
          echo "🔐 PRISM SECURITY SCAN RESULTS"
          echo "========================================="
          if [ -f vulnscan-output/pr_comment.md ]; then
            cat vulnscan-output/pr_comment.md
          else
            echo "⚠️ No report generated"
          fi
          echo "========================================="

      - name: Upload SBOM Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom-pr-${{ github.event.pull_request.number }}
          path: sbom.json

      - name: Upload Vulnerability Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report-pr-${{ github.event.pull_request.number }}
          path: vulnscan-output/

      - name: Post PR Comment with Results & Inline Fix Suggestions
        if: always() && github.event.pull_request.number
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');
            
            // Read the main report
            let comment = '## 🔐 PRISM Security Scan Results\n\n';
            if (fs.existsSync('vulnscan-output/pr_comment.md')) {
              comment += fs.readFileSync('vulnscan-output/pr_comment.md', 'utf8');
            } else {
              comment += '⚠️ Scan failed to complete. Check the workflow logs.';
            }

            // Post main comment
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

            // Post inline review comments with fix suggestions
            try {
              if (fs.existsSync('vulnscan-output/report.json')) {
                const report = JSON.parse(fs.readFileSync('vulnscan-output/report.json', 'utf8'));
                const remediations = report.remediations || [];
                
                if (remediations.length === 0) {
                  console.log('ℹ️ No remediations to suggest');
                  process.exit(0);
                }

                // Get list of changed files
                const { data: files } = await github.rest.pulls.listFiles({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: context.issue.number
                });

                // Build review comments
                const reviewComments = [];
                for (const remediation of remediations) {
                  const advice = remediation.advice || {};
                  const component = remediation.component || {};
                  const componentName = component.name;
                  const currentVersion = component.version;
                  
                  // Handle both direct fields and nested remediation_plan fields
                  const remediationPlan = advice.remediation_plan || {};
                  const recommendedVersion = advice.recommended_version || remediationPlan.recommended_version;
                  const upgradeCommand = advice.upgrade_command || remediationPlan.upgrade_command;
                  
                  if (!componentName || !recommendedVersion) {
                    console.log(`⏭️ Skipping ${componentName} - no recommended version available`);
                    continue;
                  }

                  // Determine file based on ecosystem
                  const ecosystem = (component.ecosystem || 'npm').toLowerCase();
                  let targetFile = 'package.json'; // default
                  if (ecosystem.includes('pypi')) targetFile = 'requirements.txt';
                  else if (ecosystem === 'maven') targetFile = 'pom.xml';
                  else if (ecosystem === 'go') targetFile = 'go.mod';

                  // Find matching changed file
                  const changedFile = files.find(f => f.filename.endsWith(targetFile));
                  if (!changedFile) continue;

                  // Parse the patch to find dependencies
                  const patch = changedFile.patch || '';
                  const lines = patch.split('\n');
                  
                  let position = 0;
                  for (const line of lines) {
                    position++;
                    
                    // Count position in diff (ignore old lines that start with -)
                    if (line.startsWith('@@')) continue;
                    if (line.startsWith('-')) continue;
                    
                    // Look for the package in the line
                    if (componentName && line.includes(componentName) && line.includes(currentVersion)) {
                      const upgradeCmd = upgradeCommand || 
                        (ecosystem === 'npm' ? `npm install ${componentName}@${recommendedVersion}` :
                         ecosystem.includes('pypi') ? `pip install ${componentName}==${recommendedVersion}` :
                         `Upgrade ${componentName} to ${recommendedVersion}`);

                      const fixComment = `✅ **Vulnerability Fix Available**\n\n` +
                        `Upgrade \`${componentName}\` from \`${currentVersion}\` to \`${recommendedVersion}\`\n\n` +
                        `**Fix command:**\n\`\`\`bash\n${upgradeCmd}\n\`\`\`\n\n` +
                        `This is a patch version upgrade (safe to apply). Always run tests after updating.`;

                      reviewComments.push({
                        path: changedFile.filename,
                        position: position,
                        body: fixComment
                      });
                      
                      console.log(`📝 Added inline suggestion for ${componentName} at position ${position}`);
                      break; // Move to next remediation
                    }
                  }
                }

                // Post review if we have comments
                if (reviewComments.length > 0) {
                  console.log(`📤 Posting ${reviewComments.length} inline fix suggestions...`);
                  
                  await github.rest.pulls.createReview({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    pull_number: context.issue.number,
                    commit_id: context.payload.pull_request.head.sha,
                    event: 'COMMENT',
                    body: '💡 Inline vulnerability fixes suggested below',
                    comments: reviewComments
                  });
                  
                  console.log('✅ Inline suggestions posted successfully');
                } else {
                  console.log('ℹ️ No vulnerable dependencies found in changed files');
                }
              }
            } catch (error) {
              console.warn('⚠️ Could not post inline suggestions:', error.message);
              // Don't fail the workflow, just warn
            }

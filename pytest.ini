[pytest]
# Pytest configuration for PRISM test suites

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    -ra
    --color=yes

# Markers for categorizing tests
markers =
    objective1: Tests for Objective 1 (SBOM generation & OSV scanning)
    functional: Core functional tests
    stress: High-load and scalability tests
    concurrency: Parallel operation tests
    edge: Boundary condition and edge case tests
    chaos: Failure scenario and resilience tests
    validation: Real API validation tests
    integration: End-to-end pipeline integration tests
    performance: Performance and scalability tests
    accuracy: Accuracy validation tests
    slow: Tests that take longer to run (real API calls)
    requires_api: Tests requiring external API access

# Test paths
testpaths = tests

# Console output format
console_output_style = progress

# Minimum version
minversion = 7.0

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Coverage (if pytest-cov is installed)
# addopts = --cov=agent --cov-report=html --cov-report=term

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
